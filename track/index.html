<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تتبع صيانة جهازك</title>
  <style>
    :root{--main:#2563eb;--dark:#1d4ed8;--tint:#eff6ff}*{box-sizing:border-box}body{margin:0;background:var(--tint);color:#142238;font-family:Tahoma,Arial,sans-serif}.wrap{max-width:760px;margin:auto;padding:18px}.hero,.status,.card{border-radius:24px;padding:22px;margin-bottom:16px}.hero{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--main),var(--dark));color:#fff}.logo{width:66px;height:66px;border-radius:18px;background:#fff;color:var(--main);display:grid;place-items:center;font-size:38px;font-weight:bold}.hero h1{margin:0 0 8px}.hero p{margin:0}.status{background:linear-gradient(135deg,var(--main),var(--dark));color:#fff}.status h2{font-size:30px;margin:8px 0}.card{background:#fff;box-shadow:0 10px 30px #0f172a18}.card h3{margin-top:0}.row{display:flex;justify-content:space-between;gap:15px;padding:14px 0;border-bottom:1px solid #e7eeeb}.row:last-child{border:0}.row span{color:#65748a}footer{text-align:center;color:var(--dark);font-weight:bold;padding:12px}@media(max-width:520px){.wrap{padding:12px}.row{flex-direction:column;gap:6px}.hero h1{font-size:23px}}
  </style>
</head>
<body><main class="wrap">
  <section class="hero"><div class="logo">✓</div><div><h1>تتبع صيانة جهازك</h1><p>صفحة العميل المستقلة</p></div></section>
  <section class="status"><small>الحالة الحالية</small><h2 id="status">تم استلام الجهاز</h2><p>رقم الطلب: <b id="ticket">—</b></p></section>
  <section class="card"><h3>بيانات الجهاز</h3><div class="row"><span>نوع الجوال</span><b id="device">غير محدد</b></div><div class="row"><span>المشكلة</span><b id="problem">غير محددة</b></div><div class="row"><span>تاريخ الاستلام</span><b id="received">غير محدد</b></div><div class="row"><span>آخر تحديث</span><b id="updated">—</b></div></section>
  <footer>شكراً لثقتكم بنا، نسعد بخدمتكم دائماً.</footer>
</main><script>
const p=new URLSearchParams(location.search),fields=['ticket','status','device','problem','received','updated'];
const colors={'دخل الصيانة':['#2563eb','#1d4ed8','#eff6ff'],'بانتظار الفحص':['#64748b','#475569','#f8fafc'],'جاري الفحص':['#0891b2','#0e7490','#ecfeff'],'تم تحديد العطل':['#7c3aed','#6d28d9','#f5f3ff'],'بانتظار موافقة العميل':['#d97706','#b45309','#fffbeb'],'وافق العميل':['#0d9488','#0f766e','#f0fdfa'],'رفض العميل':['#e11d48','#be123c','#fff1f2'],'يحتاج قطع غيار':['#ea580c','#c2410c','#fff7ed'],'تحت الصيانة':['#4f46e5','#4338ca','#eef2ff'],'تحت الاختبار':['#0284c7','#0369a1','#f0f9ff'],'تم الإصلاح':['#059669','#047857','#ecfdf5'],'جاهز للاستلام':['#16a34a','#15803d','#f0fdf4'],'تم التسليم':['#334155','#1e293b','#f8fafc'],'تعذر الإصلاح — جاهز للإرجاع':['#dc2626','#b91c1c','#fef2f2'],'ألغى العميل الطلب':['#991b1b','#7f1d1d','#fef2f2'],'دخل الصيانة تحت الضمان':['#9333ea','#7e22ce','#faf5ff'],'جهاز متروك':['#92400e','#78350f','#fffbeb']};
function show(data){for(const k of fields){const v=data[k];if(v)document.getElementById(k).textContent=v}const c=colors[data.status];if(c){document.documentElement.style.setProperty('--main',c[0]);document.documentElement.style.setProperty('--dark',c[1]);document.documentElement.style.setProperty('--tint',c[2])}}
show(Object.fromEntries(p));
async function refresh(){const source=p.get('source');if(!source)return;try{const response=await fetch(source,{cache:'no-store'});if(response.ok)show(await response.json())}catch(_){}}
refresh();setInterval(refresh,20000);
  </script></body>
</html>
